<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barra de clase</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="d-flex">

  
    <nav class="bg-secondary p-4" style="width: 240px; min-height: 100vh;">
        <h4 class="text-center text-dark mb-4">Menu</h4>
        <ul class="nav flex-column gap-2">
            <li class="nav-item">
                <a class="nav-link text-dark fw-semibold bg-light rounded text-center"
                   href="#" onclick="mostrarInicio()">Inicio</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-dark fw-semibold bg-light rounded text-center"
                   href="#" onclick="mostrarRegistro()">Registro</a>
            </li>
        </ul>
    </nav>

    
    <div class="container-fluid p-4">

        <h1 class="bg-secondary text-center text-primary p-3 rounded">
            Pagina de Prueba
        </h1>
        
        <div id="inicio" class="mt-4">
            <div class="row g-4">

                <div class="col-md-4">
                    <div class="card h-100 shadow">
                        <img src="https://c.files.bbci.co.uk/5985/production/_102471922_gettyimages-962792890.jpg" class="card-img-top">
                        <div class="card-body text-dark">
                            <h5 class="card-title">Card 1</h5>
                            <p class="card-text">Esto es una prueba</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card h-100 shadow">
                        <img src="https://c.files.bbci.co.uk/5985/production/_102471922_gettyimages-962792890.jpg" class="card-img-top">
                        <div class="card-body text-dark">
                            <h5 class="card-title">Card 2</h5>
                            <p class="card-text">Esto es una prueba</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card h-100 shadow">
                        <img src="https://c.files.bbci.co.uk/5985/production/_102471922_gettyimages-962792890.jpg" class="card-img-top">
                        <div class="card-body text-dark">
                            <h5 class="card-title">Card 3</h5>
                            <p class="card-text">Esto es una prueba</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div id="registro" class="mt-4" style="display:none;">
            <h2 class="mb-4 text-center">Registro de Datos Personales</h2>

            <div class="d-flex justify-content-center">
                <form class="bg-light text-dark p-4 rounded shadow"
                      style="max-width: 550px; width:100%;">

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" placeholder="Ingrese su nombre">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Apellido</label>
                        <input type="text" class="form-control" placeholder="Ingrese su apellido">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" placeholder="correo">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="tel" class="form-control" placeholder="Número de telefono">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary w-50">Registrar</button>
                        <button type="reset" class="btn btn-secondary w-50">Cancelar</button>
                    </div>
                </form>
            </div>

        </div>

    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function mostrarInicio() {
        document.getElementById("inicio").style.display = "block";
        document.getElementById("registro").style.display = "none";
    }

    function mostrarRegistro() {
        document.getElementById("inicio").style.display = "none";
        document.getElementById("registro").style.display = "block";
    }
</script>

</body>
</html>
